<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
    --accent: #7c5cfc; --accent2: #fc5c7d; --text: #e8e8f0;
    --muted: #6b6b80; --border: #2a2a38; --success: #4ecca3;
  }
  body {
    font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,252,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(252,92,125,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 560px; }
  .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.6s ease both; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  h1 {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 28px; display: flex; flex-direction: column; gap: 20px;
    animation: fadeUp 0.6s ease 0.1s both; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label {
    font-size: 13px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px;
  }
  label span.dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); display: inline-block;
  }
  textarea {
    width: 100%; min-height: 140px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: monospace; font-size: 13px;
    padding: 14px; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.7; direction: ltr;
  }
  textarea::placeholder { color: var(--muted); opacity: 0.6; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  input[type="number"], input[type="text"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 600;
    padding: 13px 16px; outline: none; transition: border-color 0.2s; text-align: center;
  }
  input::placeholder { color: var(--muted); opacity: 0.6; font-weight: 400; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: 4px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,92,252,0.35); }
  .btn:active { transform: translateY(0); opacity: 0.9; }
  .success-msg {
    display: none; align-items: center; gap: 10px;
    background: rgba(78,204,163,0.1); border: 1px solid rgba(78,204,163,0.3);
    border-radius: 10px; padding: 12px 16px; font-size: 14px; color: var(--success);
  }
  .success-msg.show { display: flex; }
  .error-msg {
    display: none; align-items: center; gap: 10px;
    background: rgba(252,92,125,0.1); border: 1px solid rgba(252,92,125,0.3);
    border-radius: 10px; padding: 12px 16px; font-size: 14px; color: var(--accent2);
  }
  .error-msg.show { display: flex; }
  .preview {
    display: none; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; font-size: 12px; color: var(--muted);
    font-family: monospace; direction: ltr; line-height: 1.8; max-height: 120px; overflow-y: auto; white-space: pre;
  }
  .preview.show { display: block; }
  .preview-label { font-size: 12px; color: var(--muted); font-family: 'Cairo', sans-serif; display: none; }
  .preview-label.show { display: block; }
  .footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <h1>M3U Generator</h1>
    </div>
    <p class="subtitle">حوّل روابط الحلقات إلى ملف playlist جاهز</p>
  </div>
  <div class="card">
    <div class="field">
      <label><span class="dot"></span> روابط الفيديو</label>
      <textarea id="links" placeholder="ضع الروابط هنا، كل رابط في سطر...
https://pixeldrain.com/api/file/xxxxx
https://pixeldrain.com/api/file/xxxxx"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label><span class="dot"></span> ترقيم الحلقات من</label>
        <input type="number" id="startNum" min="1" placeholder="مثال: 4">
      </div>
      <div class="field">
        <label><span class="dot"></span> اسم الأنمي / الملف</label>
        <input type="text" id="filename" placeholder="مثال: Naruto">
      </div>
    </div>
    <div class="error-msg" id="errorMsg">⚠️ <span id="errorText"></span></div>
    <button class="btn" onclick="generate()">⬇️ تحميل ملف M3U</button>
    <div class="preview-label" id="previewLabel">معاينة الملف:</div>
    <div class="preview" id="preview"></div>
    <div class="success-msg" id="successMsg">✅ تم تحميل الملف بنجاح!</div>
  </div>
  <p class="footer">Created by: Louay Hamdi</p>
</div>
<script>
function generate() {
  var linksRaw = document.getElementById('links').value.trim();
  var startNumRaw = parseInt(document.getElementById('startNum').value);
  var filename = document.getElementById('filename').value.trim();
  var errorMsg = document.getElementById('errorMsg');
  var errorText = document.getElementById('errorText');
  var successMsg = document.getElementById('successMsg');
  var preview = document.getElementById('preview');
  var previewLabel = document.getElementById('previewLabel');

  errorMsg.classList.remove('show');
  successMsg.classList.remove('show');
  preview.classList.remove('show');
  previewLabel.classList.remove('show');

  if (!linksRaw) {
    errorText.textContent = 'ضع الروابط أولاً!';
    errorMsg.classList.add('show');
    return;
  }
  if (!startNumRaw || startNumRaw < 1) {
    errorText.textContent = 'اكتب رقم الحلقة التي تبدأ منها!';
    errorMsg.classList.add('show');
    return;
  }
  if (!filename) {
    errorText.textContent = 'اكتب اسم الأنمي أو الملف!';
    errorMsg.classList.add('show');
    return;
  }

  var links = linksRaw.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });

  if (links.length === 0) {
    errorText.textContent = 'لم يتم العثور على روابط صحيحة!';
    errorMsg.classList.add('show');
    return;
  }

  var m3u = '#EXTM3U\n';
  for (var i = 0; i < links.length; i++) {
    var ep = startNumRaw + i;
    m3u += '#EXTINF:-1,' + filename + ' - الحلقة ' + ep + '\n' + links[i] + '\n';
  }

  preview.textContent = m3u;
  preview.classList.add('show');
  previewLabel.classList.add('show');

  var blob = new Blob([m3u], { type: 'audio/mpegurl' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename + '.m3u';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  successMsg.classList.add('show');
}
</script>
</body>
</html>
